server {
	listen 127.0.0.1:8080;
	server_name webserv.com www.webserv.com;
	client_max_body_size 10M;
	error_page 404 /errors/404.html;
	error_page 500 502 503 /errors/50x.html;

	location / {
		root /var/www/html;
		index index.html;
		autoindex off;
		allow_methods GET POST;
	}

	location /uploads {
		root /var/www/uploads;
		allow_methods GET POST DELETE;
		upload_store /var/www/uploads;
	}

	location /cgi-bin {
		root /var/www/cgi;
		allow_methods GET POST;
		cgi .py /usr/bin/python3;
	}

	location /old {
		return 301 /new;
	}
}

server {
	listen 8081;
	server_name second.com;

	location / {
		root /var/www/second;
		index index.html;
		autoindex on;
	}
}